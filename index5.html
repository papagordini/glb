<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Stol model v2</title>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@babylonjs/viewer/dist/babylon-viewer.esm.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      background: #4D4D4D;
    }
    h2, p {
      margin: 10px;
    }
    ul {
      list-style-type: none;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #333333;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
    }
    ul li {
      float: left;
    }
    ul li a {
      display: block;
      color: white;
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
    }
    ul li a.active {
      font-weight: bold;
      background-color: #222222;
    }
    ul li a:hover {
      background-color: #111111;
    }

    #viewer-wrap {
      margin-top: 100px;
      width: 100%;
      height: calc(100vh - 100px);
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      overflow: hidden;
      background: #fff;
    }

    babylon-viewer {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>

  <ul>
    <li><a href="index.html">polica</a></li>

    <li><a href="index5.html" class="active">stol v2</a></li>
  </ul>

    <babylon-viewer
      source="assets/stolic_manji.glb"
      exposure="0.6"
      camera-auto-orbit
      camera-auto-orbit-speed="0.5"
    ></babylon-viewer>
  </div>

</body>
</html>
