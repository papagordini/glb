<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Stol model v2</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body{
      margin:0;
      padding:0;
      display:flex;
      flex-direction:column;
      gap:12px;
      justify-content:center;
      align-items:stretch;
      height:100vh;
      background:#4D4D4D;
      padding-top.60px;
    }
    h2, p {
      margin: 10px;
    }
    ul {
      list-style-type: none;
      margin:0;
      padding:0;
      overflow: hidden;
      background-color: #333333;
      position:fixed;
      top:0;
      width:100%;
      z-index:1000;
    }
    ul li {
      float:left;
    }
    ul li a {
      display: block;
      color: white;
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
    }
    ul li a.active {
      font-weight:bold;
      background-color: #222222;
    }
    ul li a:hover {
      background-color: #111111;
    }
       
    model-viewer{
      margin-top:0;
      width:100%;
      height:calc(100vh-60px);
      border-radius:10px;
      box-shadow:0 4px 20px rgba(0,0,0,0.25);
      background:#fff; /* viewer canvas bg */
    }
  </style>
</head>
<body>
  <ul>
  <li><a href="index.html">polica</a></li>
  <li><a href="index2.html">polica sa komentarima</a></li>
  <li><a href="index3.html">stol</a></li>
  <li><a href="index4.html" class="active">stol v2</a></li>
  </ul>
  <model-viewer src="assets/stol.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls tone-mapping="neutral" poster="poster.webp" shadow-intensity="1" exposure="1" shadow-softness="1">
    <div class="progress-bar hide" slot="progress-bar">
        <div class="update-bar"></div>
    </div>
    <button slot="ar-button" id="ar-button">
        View in your space
    </button>
    <div id="ar-prompt">
        <img src="https://modelviewer.dev/shared-assets/icons/hand.png">
    </div>
</model-viewer>
</body>
</html>
